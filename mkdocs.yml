site_name: Community Lecture Archive
site_description: Archive of weekly lectures and monthly events with links to videos and resources
site_url: https://yourusername.github.io/quantum-ai/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-auto
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true

nav:
  - Home: index.md
  - Lectures:
      - Overview: lectures/index.md
  - Events:
      - Overview: events/index.md
  - Resources: resources/index.md
  - Contributors: contributors/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/quantum-ai
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@yourchannel

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true


